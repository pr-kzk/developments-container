services:
  dev-env:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dev-environment
    hostname: dev-env
    restart: unless-stopped
    init: true
    env_file: .env

    # rootless Docker では user namespace のマッピングにより socket への書き込みが通るため
    # group_add は不要。rootful Docker で運用する場合は以下を有効化する。
    # group_add:
    #   - ${DOCKER_GID:-999}

    networks:
      - dev-network
    ports:
      - "2222:22"   # SSH

    volumes:
      # DooD: ホストの Docker ソケット
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock

      # ワークスペース (コード)
      - ./workspace:/home/dev/workspace

      # 認証情報 (bind mount) — 誤って named volume を消しても再ログイン不要にするため
      - ./secrets/aws:/home/dev/.aws
      - ./secrets/azure:/home/dev/.azure
      - ./secrets/gh:/home/dev/.config/gh
      - ./secrets/claude:/home/dev/.claude
      - ./secrets/codex:/home/dev/.codex
      - ./secrets/copilot:/home/dev/.copilot
      - ./secrets/databricks:/home/dev/.databricks

      # キャッシュ系 (named volume) — 消えても DL し直せる
      - dev-nvm:/home/dev/.nvm
      - dev-npm:/home/dev/.npm
      - dev-cache:/home/dev/.cache
      - dev-local-share:/home/dev/.local/share

      # SSH (authorized_keys 等)
      - dev-ssh:/home/dev/.ssh

      # sshd のホスト鍵だけ永続化 (sshd_config 本体は Dockerfile 管理)
      - sshd-host-keys:/etc/ssh/host_keys

    environment:
      DOCKER_HOST: unix:///var/run/docker.sock

    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/22"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s


volumes:
  dev-nvm:
    driver: local
  dev-npm:
    driver: local
  dev-cache:
    driver: local
  dev-local-share:
    driver: local
  dev-ssh:
    driver: local
  sshd-host-keys:
    driver: local

networks:
  dev-network:
    driver: bridge
