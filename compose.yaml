services:
  dev-env:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dev-environment
    restart: always

    # Docker ソケットアクセス用（entrypoint.sh で動的に GID を解決するためフォールバック）
    # rootful Docker: `getent group docker | cut -d: -f3` で確認して設定
    group_add:
      - ${DOCKER_GID:-999}

    networks:
      - dev-network
    ports:
      - "2222:22"   # SSH

    volumes:
      # DooD: ホストの Docker ソケットを共有（.env で DOCKER_SOCK を設定）
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
      # ワークスペース
      - ./workspace:/home/dev/workspace
      # ホームディレクトリ永続化
      - dev-home:/home/dev
      # SSH ホストキー永続化
      - sshd-keys:/etc/ssh

    environment:
      SHELL: /bin/zsh
      DOCKER_HOST: unix:///var/run/docker.sock

    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/22"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s


volumes:
  dev-home:
    driver: local
  sshd-keys:
    driver: local

networks:
  dev-network:
    driver: bridge
